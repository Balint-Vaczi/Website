<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact – Aerosoft</title>
    <link rel="icon" href="Images/Globe_rotating.gif">
    <link rel="stylesheet" href="Styles/style.css">
</head>
<body>

    <!-- Header -->
    <header class="header">
        <a href="index.html" class="header-brand">
            <img src="Images/logo.png" alt="Logo" class="header-logo">
            <span class="brand-name">Aerosoft</span>
        </a>
        <nav class="header-nav">
            <a href="products.html" class="nav-link">Products</a>
            <a href="vision.html" class="nav-link">Vision</a>
            <a href="contact.html" class="nav-link">Contact</a>
        </nav>
    </header>

    <!-- Contact Section -->
    <section class="contact-section">
        <div class="contact-card">
            <img src="Images/frutiger_people.png" alt="Contact" class="contact-card-img">
            <p class="contact-prompt">Contact Us</p>
            <form class="contact-form">
                <label class="form-label">Name <span class="req">*</span></label>
                <input type="text" placeholder="Your Name" required>
                <label class="form-label">Email <span class="req">*</span></label>
                <input type="email" placeholder="Your Email" required>
                <label class="form-label">Message <span class="req">*</span></label>
                <textarea placeholder="Your Message" required></textarea>
                <button type="submit">Send</button>
            </form>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2026 Aerosoft. All rights reserved.</p>
    </footer>

</body>
</html>
