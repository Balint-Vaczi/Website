<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Get in touch with Aerosoft. Send us a message and a member of our team will get back to you.">
    <meta name="keywords" content="contact Aerosoft, get in touch, Aerosoft support, send message">
    <meta name="author" content="Aerosoft">
    <title>Contact - Aerosoft</title>
    <link rel="icon" href="Images/Globe_rotating.gif">
    <link rel="stylesheet" href="Styles/style.css">
</head>
<body>

    <!-- Header -->
    <header class="header">
        <a href="index.html" class="header-brand">
            <img src="Images/logo.png" alt="Logo" class="header-logo">
            <span class="brand-name">Aerosoft</span>
        </a>
        <nav class="header-nav">
            <a href="products.html" class="nav-link">Products</a>
            <a href="vision.html" class="nav-link">Vision</a>
            <a href="contact.html" class="nav-link">Contact</a>
        </nav>
    </header>

    <!-- Contact Section -->
    <section class="contact-section">
        <div class="contact-area">

            <!-- Contact Form — method GET so submitted data is visible in the URL -->
            <div class="contact-card">
                <img src="Images/frutiger_people.png" alt="Contact" class="contact-card-img">
                <h2 class="contact-prompt">Contact Us</h2>
                <form class="contact-form" method="GET" action="contact.html">
                    <label class="form-label" for="name">Name <span class="req">*</span></label>
                    <input type="text" id="name" name="name" placeholder="Your Name" minlength="2" required>

                    <label class="form-label" for="email">Email <span class="req">*</span></label>
                    <input type="email" id="email" name="email" placeholder="Your Email" required>

                    <label class="form-label" for="subject">Subject</label>
                    <input type="text" id="subject" name="subject" placeholder="Subject (optional)">

                    <label class="form-label" for="message">Message <span class="req">*</span></label>
                    <textarea id="message" name="message" placeholder="Your Message" minlength="10" required></textarea>

                    <button type="submit">Send</button>
                </form>
            </div>

            <!-- Google Maps -->
            <div class="map-section">
                <h3 class="map-heading">Find Us</h3>
                <p class="map-subtext">Aerosoft HQ &mdash; Dublin, Ireland</p>
                <div class="map-wrapper">
                    <iframe
                        src="https://maps.google.com/maps?q=Dublin,Ireland&output=embed&hl=en"
                        width="100%"
                        height="420"
                        style="border:0;"
                        allowfullscreen=""
                        loading="lazy"
                        referrerpolicy="no-referrer-when-downgrade"
                        title="Aerosoft HQ &mdash; Dublin, Ireland">
                    </iframe>
                </div>
            </div>

        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-content">
            <p class="footer-copy">&copy; 2026 Aerosoft. All rights reserved.</p>
            <nav class="footer-nav">
                <a href="index.html" class="footer-nav-link">Home</a>
                <a href="products.html" class="footer-nav-link">Products</a>
                <a href="vision.html" class="footer-nav-link">Vision</a>
                <a href="contact.html" class="footer-nav-link">Contact</a>
            </nav>
        </div>
    </footer>

</body>
</html>
